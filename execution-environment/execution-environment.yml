---
version: 3

options:
  # ee-supported-rhel9 uses microdnf; /usr/bin/dnf is not present in the base image.
  package_manager_path: /usr/bin/microdnf

images:
  base_image:
    name: registry.redhat.io/ansible-automation-platform-26/ee-supported-rhel9:latest

dependencies:
  ansible_core:
    package_pip: ansible-core>=2.16
  ansible_runner:
    package_pip: ansible-runner>=2.3
  galaxy: requirements.yml
  python: ../ansible-harbor-vault/requirements-python.txt
  system: ee/bindep.txt
  exclude:
    python:
      - systemd-python
      - ovirt-engine-sdk-python

additional_build_steps:
  append_base: |
    # Base image ships curl-minimal; installing curl conflicts with it. Git is needed for some collection installs.
    RUN $PKGMGR install -y git
    RUN curl -fsSL https://rpm.releases.hashicorp.com/RHEL/hashicorp.repo -o /etc/yum.repos.d/hashicorp.repo
    RUN $PKGMGR install -y terraform
