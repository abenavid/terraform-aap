---
- name: Declarative AAP Configuration Deployment
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    env: "{{ target_env | default('dev') }}"

  tasks:
    # -------------------------------------------------------------------------
    # PRE-FLIGHT / VARIABLE LOADING
    # -------------------------------------------------------------------------

    - name: Check if configuration directories exist
      ansible.builtin.stat:
        path: "../configs/{{ item }}"
      register: config_dirs
      loop: ['all', "{{ env }}"]

    - name: Load All Configuration Variables
      ansible.builtin.include_vars:
        dir: "../configs/{{ item.item }}"
        extensions: ['yml', 'yaml']
      loop: "{{ config_dirs.results }}"
      when: item.stat.exists and item.stat.isdir

    # -------------------------------------------------------------------------
    # DEPLOY PHASE (The Dispatch Architecture)
    # -------------------------------------------------------------------------

    - name: Apply Configuration as Code State via Dispatch
      ansible.builtin.include_role:
        name: infra.aap_configuration.dispatch
