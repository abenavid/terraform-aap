---
controller_job_templates:
  - name: Terraform Create EC2
    job_type: run
    organization: Default
    inventory: Demo Inventory
    project: "terraform-aap"
    playbook: playbooks/tf_ops.yml
    execution_environment: EE AWS Terraform
    credentials:
      - AWS
      - env Credential
      - SSH Private Key TF Demo
    survey_enabled: true
    verbosity: 1
  - name: Terraform Create EC2 duplicate
    job_type: run
    organization: Default
    inventory: Demo Inventory
    project: "terraform-aap"
    playbook: playbooks/deploy_cac.yml
    execution_environment: EE AWS Terraform
    credentials:
      - AWS
      - env Credential
      - SSH Private Key TF Demo
    survey_enabled: true
    verbosity: 1
