---
# 1) Build the EE locally:
#      ansible-builder (see execution-environment/execution-environment.yml)
#
# 2) Run Terraform via Ansible (stdout):
#      ansible-navigator run ansible/tf_ops.yml -m stdout --pae false \
#        -e tf_ssh_public_key="$(cat ~/.ssh/id_rsa.pub)"
#
# Image tag must match your ansible-builder -t (default: terraform-aap-ee:latest).

ansible-navigator:
  ansible:
    config:
      path: ansible.cfg
    inventory:
      entries:
        - ansible/inventory/hosts.ini
    playbook:
      path: ansible/tf_ops.yml
  execution-environment:
    enabled: true
    image: terraform-aap-ee:latest
    container-engine: auto
    pull:
      policy: never
