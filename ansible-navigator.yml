---
# 1) Build the EE locally (required — this image is not on a registry):
#      ./execution-environment/build-ee.sh
#    Use the same container engine navigator will use. Podman and Docker have
#    separate image stores; if you build with Docker, run navigator with --ce docker.
#
# 2) Run (stdout): ansible-navigator run deploy.yml -m stdout --pae false
#
# Image tag must match build-ee.sh (default: terraform-aap-ee:latest). Override with:
#   IMAGE_NAME=terraform-aap-ee:dev ./execution-environment/build-ee.sh

ansible-navigator:
  ansible:
    config:
      path: ansible.cfg
    inventory:
      entries:
        - inventory.ini
    playbook:
      path: deploy.yml
  execution-environment:
    enabled: true
    image: terraform-aap-ee:latest
    container-engine: auto
    pull:
      # never: do not try docker.io for a local-only tag (policy "missing" pulls if absent)
      policy: never
