---
# Single playbook for AAP: Terraform provisions AWS, then Ansible configures new hosts in the same run.
# AWS credentials must come from the environment (e.g. AAP cloud credential). Do not pass AWS keys in vars.
#
# ssh_public_key is expected from an AAP Job Template survey (or -e for local runs).
#
# Local example (paste key material; do not use lookup('file')):
#   ansible-playbook ansible/tf_ops.yml -e 'ssh_public_key="ssh-ed25519 AAAA... comment"'

- name: "Play 1: Apply Terraform and build in-memory inventory"
  hosts: localhost
  connection: local
  gather_facts: false
  vars_files:
    - vars/main.yml
  tasks:
    - name: Require SSH public key for EC2 key pair
      ansible.builtin.assert:
        that:
          - ssh_public_key is defined
          - (ssh_public_key | string | trim | length) > 0
        fail_msg: >-
          Set ssh_public_key (AAP survey for Job Template, or -e ssh_public_key="ssh-ed25519 AAAA...").
          Public key only; never commit private keys.

    - name: Verify Terraform CLI exists in execution environment
      ansible.builtin.stat:
        path: "{{ tf_terraform_binary }}"
      register: tf_terraform_stat

    - name: Fail if Terraform CLI is missing
      ansible.builtin.fail:
        msg: >-
          Terraform CLI not found at {{ tf_terraform_binary }}.
          The Job Template must use an execution environment that installs Terraform (e.g. build from
          execution-environment/execution-environment.yml, push to your hub, and select that EE).
      when: not tf_terraform_stat.stat.exists

    - name: Apply Terraform configuration
      cloud.terraform.terraform:
        project_path: "{{ playbook_dir }}/../terraform"
        binary_path: "{{ tf_terraform_binary }}"
        state: present
        force_init: true
        complex_vars: true
        variables:
          region: "{{ tf_region }}"
          instance_type: "{{ tf_instance_type }}"
          name_prefix: "{{ tf_name_prefix }}"
          web_demo_ssh_pubkey: "{{ ssh_public_key }}"
          create_vpc: "{{ tf_create_vpc }}"
          existing_vpc_id: "{{ tf_existing_vpc_id }}"
          existing_subnet_id: "{{ tf_existing_subnet_id }}"
          vpc_cidr: "{{ tf_vpc_cidr }}"
          public_subnet_cidr: "{{ tf_public_subnet_cidr }}"
      register: tf_apply

    - name: Normalize Terraform outputs (cloud.terraform exposes .value per output)
      ansible.builtin.set_fact:
        tf_public_ips: "{{ tf_apply.outputs.public_ips.value }}"
        tf_private_ips: "{{ tf_apply.outputs.private_ips.value }}"
        tf_instance_ids: "{{ tf_apply.outputs.instance_ids.value }}"
        tf_instance_names: "{{ tf_apply.outputs.instance_names.value }}"

    - name: Add EC2 instances to in-memory group tf_group_web_demo
      ansible.builtin.add_host:
        name: "{{ item.3 if (item.3 | default('') | trim | length) > 0 else item.0 }}"
        groups: tf_group_web_demo
        ansible_host: "{{ item.0 }}"
        public_ip_address: "{{ item.0 }}"
        private_ip_address: "{{ item.1 }}"
        instance_id: "{{ item.2 }}"
        computer_name: "{{ item.3 | default('') }}"
        ansible_user: ec2-user
      loop: "{{ tf_public_ips | zip(tf_private_ips, tf_instance_ids, tf_instance_names) | list }}"

- name: "Play 2: Configure web servers on Terraform-created hosts"
  hosts: tf_group_web_demo
  gather_facts: true
  become: true
  vars_files:
    - vars/main.yml
  tasks:
    - name: Wait for SSH (instance may still be booting)
      ansible.builtin.wait_for_connection:
        delay: 10
        timeout: 300

    - name: Install httpd and firewalld
      ansible.builtin.dnf:
        name:
          - httpd
          - firewalld
        state: present

    - name: Start and enable firewalld
      ansible.builtin.systemd:
        name: firewalld
        state: started
        enabled: true

    - name: Allow HTTP in firewalld
      ansible.posix.firewalld:
        service: http
        permanent: true
        state: enabled
        immediate: true

    - name: Deploy index page
      ansible.builtin.template:
        src: templates/index.html.j2
        dest: /var/www/html/index.html
        mode: "0644"

    - name: Start and enable httpd
      ansible.builtin.systemd:
        name: httpd
        state: started
        enabled: true

- name: "Play 3: Pause for manual verification"
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Wait 5 minutes 
      ansible.builtin.pause:
        minutes: 5
    

- name: "Play 4: Destroy Terraform-managed infrastructure"
  hosts: localhost
  connection: local
  gather_facts: false
  vars_files:
    - vars/main.yml
  tasks:
    - name: Require SSH public key for EC2 key pair
      ansible.builtin.assert:
        that:
          - ssh_public_key is defined
          - (ssh_public_key | string | trim | length) > 0
        fail_msg: >-
          Set ssh_public_key (AAP survey for Job Template, or -e ssh_public_key="ssh-ed25519 AAAA...").
          Public key only; never commit private keys.

    - name: Verify Terraform CLI exists in execution environment
      ansible.builtin.stat:
        path: "{{ tf_terraform_binary }}"
      register: tf_terraform_stat

    - name: Fail if Terraform CLI is missing
      ansible.builtin.fail:
        msg: >-
          Terraform CLI not found at {{ tf_terraform_binary }}.
          The Job Template must use an execution environment that installs Terraform (e.g. build from
          execution-environment/execution-environment.yml, push to your hub, and select that EE).
      when: not tf_terraform_stat.stat.exists

    - name: Destroy Terraform configuration (EC2, key pair, security group, and VPC if created)
      cloud.terraform.terraform:
        project_path: "{{ playbook_dir }}/../terraform"
        binary_path: "{{ tf_terraform_binary }}"
        state: absent
        force_init: true
        complex_vars: true
        variables:
          region: "{{ tf_region }}"
          instance_type: "{{ tf_instance_type }}"
          name_prefix: "{{ tf_name_prefix }}"
          web_demo_ssh_pubkey: "{{ ssh_public_key }}"
          create_vpc: "{{ tf_create_vpc }}"
          existing_vpc_id: "{{ tf_existing_vpc_id }}"
          existing_subnet_id: "{{ tf_existing_subnet_id }}"
          vpc_cidr: "{{ tf_vpc_cidr }}"
          public_subnet_cidr: "{{ tf_public_subnet_cidr }}"
